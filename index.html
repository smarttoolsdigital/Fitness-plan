<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ascension Cycle — 23-Day Rotation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap">
<style>
  :root{
    --bg:#0b0a09;
    --surface:#15120f;
    --surface-2:#1d1814;
    --line:#2a2420;
    --bone:#e8e2d4;
    --bone-dim:#8f8779;
    --crimson:#9c1f2e;
    --crimson-bright:#d6334a;
    --crimson-dim:#3d1218;
    --gold:#b8893f;
  }
  *{box-sizing:border-box;}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }

  body{
    margin:0;
    background:var(--bg);
    background-image:
      radial-gradient(circle at 50% -10%, rgba(156,31,46,0.10), transparent 55%);
    color:var(--bone);
    font-family:'Oswald', 'Arial Narrow', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:18px 14px 40px;
  }
  .app{ width:100%; max-width:460px; }

  .eyebrow{
    text-align:center; font-size:11px; letter-spacing:.22em; color:var(--bone-dim);
    text-transform:uppercase; margin-bottom:6px;
  }

  .dial-wrap{ display:flex; justify-content:center; margin:6px 0 4px; }
  .dial-center{
    text-align:center;
  }
  .dial-center .lap{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--gold); letter-spacing:.08em; }
  .dial-center .num{ font-family:'JetBrains Mono',monospace; font-size:30px; font-weight:700; color:var(--bone); line-height:1; }
  .dial-center .of{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--bone-dim); }

  h1.title{
    text-align:center; font-size:22px; letter-spacing:.04em; margin:10px 0 2px;
    text-transform:uppercase; font-weight:700;
  }
  .subtitle{ text-align:center; color:var(--bone-dim); font-size:13px; margin-bottom:14px; }
  .phase-tag{
    display:inline-block; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.14em;
    padding:3px 9px; border-radius:3px; text-transform:uppercase; font-weight:600;
  }
  .phase-row{ display:flex; justify-content:center; margin-bottom:14px; }
  .ph-ANTERIOR{ background:var(--crimson-dim); color:var(--crimson-bright); border:1px solid var(--crimson); }
  .ph-POSTERIOR{ background:var(--crimson-dim); color:var(--crimson-bright); border:1px solid var(--crimson); }
  .ph-PAIR{ background:transparent; color:var(--bone); border:1px solid var(--crimson); }
  .ph-RECOVERY{ background:transparent; color:var(--gold); border:1px solid var(--gold); }
  .ph-REST{ background:transparent; color:var(--bone-dim); border:1px solid var(--line); }
  .ph-BURNOUT{ background:var(--crimson); color:var(--bone); border:1px solid var(--crimson-bright); }

  .nav{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px; gap:8px;
  }
  .navbtn{
    background:var(--surface); border:1px solid var(--line); color:var(--bone);
    font-family:'JetBrains Mono',monospace; font-size:14px; padding:9px 14px; border-radius:6px;
    cursor:pointer; flex:0 0 auto;
  }
  .navbtn:active{ background:var(--surface-2); }
  .status-pill{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.08em;
    color:var(--bone-dim); text-align:center; flex:1; cursor:pointer; user-select:none;
  }
  .status-pill.today{ color:var(--gold); }

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:14px 14px 12px; margin-bottom:10px;
    animation:fadeUp .35s ease;
  }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .ex-name{ font-size:15px; font-weight:600; letter-spacing:.01em; display:flex; align-items:center; gap:6px; }
  .ex-meta{
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--bone-dim); margin:3px 0 8px;
  }
  .ex-cue{ font-size:12.5px; color:var(--bone-dim); font-family:Arial, sans-serif; line-height:1.4; margin-bottom:10px; font-style:italic; }
  .finisher-tag{
    font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.12em; color:var(--gold);
    border:1px solid var(--gold); border-radius:3px; padding:1px 6px; text-transform:uppercase;
  }
  .flag{
    font-size:10px; color:#e0a23a; border:1px solid #e0a23a; border-radius:3px; padding:1px 5px;
    font-family:'JetBrains Mono',monospace; letter-spacing:.05em;
  }

  .pips{ display:flex; flex-wrap:wrap; gap:7px; }
  .pip{
    width:34px; height:34px; border-radius:6px; border:1px solid var(--line);
    background:var(--surface-2); color:var(--bone-dim);
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transition:all .15s ease;
  }
  .pip.done{ background:var(--crimson); border-color:var(--crimson-bright); color:var(--bone); transform:scale(1.04); }
  .pip.burnoutset{ border-color:var(--gold); color:var(--gold); }
  .pip.burnoutset.done{ background:var(--gold); border-color:var(--gold); color:#1a1408; }
  .pip.readonly{ cursor:default; opacity:.55; }
  .pip.optional{ border-style:dashed; }
  .pip-note{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--bone-dim); margin-top:6px; line-height:1.4; }

  .name-input{
    width:100%; background:var(--surface-2); border:1px solid var(--line); color:var(--bone);
    font-family:'Oswald',sans-serif; font-size:14px; padding:8px 10px; border-radius:6px; margin-bottom:10px;
  }
  .name-input::placeholder{ color:var(--bone-dim); }

  .check-line{
    display:flex; align-items:center; gap:10px; padding:7px 0; font-size:13.5px; cursor:pointer;
    border-bottom:1px solid var(--line);
  }
  .check-line:last-child{ border-bottom:none; }
  .check-box{
    width:20px; height:20px; border-radius:4px; border:1px solid var(--line); background:var(--surface-2);
    flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--bone);
  }
  .check-box.done{ background:var(--crimson); border-color:var(--crimson-bright); }
  .check-line.done .check-text{ color:var(--bone-dim); text-decoration:line-through; }
  .group-label{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.1em; color:var(--gold);
    text-transform:uppercase; margin:14px 0 4px;
  }
  .group-label:first-child{ margin-top:0; }

  .restmsg{ text-align:center; padding:18px 6px; color:var(--bone-dim); font-size:14px; line-height:1.6; }
  .restmsg b{ color:var(--bone); }

  .complete-btn{
    width:100%; padding:15px; border-radius:8px; border:none; cursor:pointer;
    background:linear-gradient(135deg, var(--crimson), var(--crimson-bright));
    color:var(--bone); font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:.06em;
    font-size:15px; text-transform:uppercase; margin-top:6px;
  }
  .complete-btn:active{ transform:scale(0.98); }
  .preview-btn{
    width:100%; padding:13px; border-radius:8px; border:1px solid var(--gold); cursor:pointer;
    background:transparent; color:var(--gold); font-family:'JetBrains Mono',monospace; font-size:13px;
    letter-spacing:.05em; text-transform:uppercase; margin-top:6px;
  }

  .history{ margin-top:18px; }
  .history-title{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.12em; color:var(--bone-dim); text-transform:uppercase; margin-bottom:8px; }
  .h-row{ display:flex; justify-content:space-between; font-size:12.5px; padding:6px 0; border-bottom:1px solid var(--line); color:var(--bone-dim); }
  .h-row span:first-child{ color:var(--bone); font-family:'JetBrains Mono',monospace; }
  .empty-hist{ color:var(--bone-dim); font-size:12.5px; text-align:center; padding:8px 0; }

  .footer-row{ display:flex; justify-content:space-between; align-items:center; margin-top:22px; }
  .reset-link{ color:var(--bone-dim); font-size:11px; font-family:'JetBrains Mono',monospace; cursor:pointer; text-decoration:underline; }
  .loading{ text-align:center; padding:60px 0; color:var(--bone-dim); font-family:'JetBrains Mono',monospace; }
</style>
</head>
<body>
<div class="app" id="app"><div class="loading">loading cycle…</div></div>

<script>
const STORAGE_KEY = 'fit-cycle-state-v1';

const WEEKDAYS = ['Friday','Saturday','Sunday','Monday','Tuesday','Wednesday','Thursday'];
function weekdayFor(day){ return WEEKDAYS[(day-1) % 7]; }

const CYCLE = [
 // Phase 1 — paired muscle groups, freeform (days 1-7)
 {day:1, phase:'PAIR', title:'Shoulders + Body Squats', type:'pair', muscles:['Shoulders','Body Squats'], finisherName:'Push-up finisher'},
 {day:2, phase:'PAIR', title:'Back + Biceps', type:'pair', muscles:['Back','Biceps'], note:'Extensive stretching afterward.'},
 {day:3, phase:'PAIR', title:'Chest + Triceps', type:'pair', muscles:['Chest','Triceps'], finisherName:'Shoulder finisher'},
 {day:4, phase:'PAIR', title:'Biceps + Lunges/Calf Raises', type:'pair', muscles:['Biceps','Lunges / Calf Raises'], finisherName:'Back finisher'},
 {day:5, phase:'PAIR', title:'Shoulders + Chest', type:'pair', muscles:['Shoulders','Chest'], finisherName:'Triceps finisher'},
 {day:6, phase:'PAIR', title:'Back + Biceps', type:'pair', muscles:['Back','Biceps'], finisherName:'Squat finisher'},
 {day:7, phase:'REST', title:'Rest', type:'rest'},
 // Phase 2 — Anterior / Posterior detailed block (days 8-13)
 {day:8, phase:'ANTERIOR', title:'Quads · Chest · Shoulders', type:'training', exercises:[
   {id:'d1e1', name:'Goblet Squat', setsMin:7, setsMax:8, reps:'10–20', cue:'3s down, 1s pause at the bottom. Too easy? Pause longer in the hole.'},
   {id:'d1e2', name:'DB Floor Press', setsMin:7, setsMax:8, reps:'8–15', cue:'Slow eccentric on the way down.'},
   {id:'d1e3', name:'Standing One-Arm Shoulder Press', setsMin:7, setsMax:7, reps:'8–12 / side', cue:'Core tight, no lean-back. Add a 1–2s hold overhead.'},
   {id:'d1e4', name:'Lateral Raise', setsMin:7, setsMax:7, reps:'12–25', cue:'Slight elbow bend, controlled — or it turns into a windmill.'},
   {id:'d1e5', name:'Core Finisher — pick 2', setsMin:2, setsMax:2, reps:'sit-ups 10–20 · leg raises 10–15 · plank 30–60s', cue:'Choose any two of the three.', finisher:true},
 ]},
 {day:9, phase:'POSTERIOR', title:'Hamstrings · Glutes · Back', type:'training', exercises:[
   {id:'d2e1', name:'Romanian Deadlift', setsMin:4, setsMax:4, reps:'10–20', cue:'Hips back, like closing a car door with your butt.', flag:'Hip-hinge'},
   {id:'d2e2', name:'Bent-Over Row', setsMin:4, setsMax:4, reps:'10–20 / side', cue:'Pause at the top — squeeze a pencil between your shoulder blades.'},
   {id:'d2e3', name:'Rear Delt Fly', setsMin:3, setsMax:3, reps:'12–25', cue:'Slight forward hinge. Light weight, strict form.'},
   {id:'d2e4', name:'Shrugs', setsMin:3, setsMax:3, reps:'12–20', cue:'Hold the top 1–2s.'},
   {id:'d2e5', name:'Glute Bridge', setsMin:3, setsMax:4, reps:'12–25', cue:'Squeeze like you’re cracking a walnut.'},
   {id:'d2e6', name:'Biceps — burnout', setsMin:3, setsMax:3, reps:'progressive overload to burnout', cue:'', finisher:true},
 ]},
 {day:10, phase:'RECOVERY', title:'Active Recovery', type:'recovery'},
 {day:11, phase:'ANTERIOR', title:'Quads · Glutes · Chest', type:'training', exercises:[
   {id:'d4e1', name:'Bulgarian Split Squat', setsMin:7, setsMax:8, reps:'8–15 / leg', cue:'Rear foot up on a couch/chair. This will humble you fast.'},
   {id:'d4e2', name:'DB Floor Press', setsMin:7, setsMax:8, reps:'8–15', cue:'Slow eccentric.'},
   {id:'d4e3', name:'Arnold Press + Lateral Raise — burnout', setsMin:2, setsMax:2, reps:'burnout', cue:'Stack both moves back to back for the finisher.', finisher:true},
 ]},
 {day:12, phase:'POSTERIOR', title:'Hamstrings · Back · Glutes', type:'training', exercises:[
   {id:'d5e1', name:'Single-Leg RDL', setsMin:3, setsMax:4, reps:'8–15 / leg', cue:'Slow and controlled — a little wobble is normal.', flag:'Hip-hinge'},
   {id:'d5e2', name:'DB Pullover', setsMin:4, setsMax:4, reps:'10–20 / side', cue:'Pause at full stretch.'},
   {id:'d5e3', name:'Rear Delt Fly', setsMin:3, setsMax:3, reps:'12–25', cue:'Light weight, strict form.'},
   {id:'d5e4', name:'Shrugs', setsMin:3, setsMax:3, reps:'12–20', cue:'Hold the top 1–2s.'},
   {id:'d5e5', name:'Glute Bridge', setsMin:3, setsMax:4, reps:'12–25', cue:'Squeeze like you’re cracking a walnut.'},
   {id:'d5e6', name:'Triceps — burnout', setsMin:3, setsMax:3, reps:'progressive overload to burnout', cue:'', finisher:true},
 ]},
 {day:13, phase:'REST', title:'Rest / Sleep', type:'rest'},
 // Phase 3 — single muscle, close-to-burnout block (days 14-21)
 {day:14, phase:'BURNOUT', title:'Biceps', type:'burnout', muscle:'Biceps', finisherName:'Diamond push-up finisher'},
 {day:15, phase:'BURNOUT', title:'Shoulders', type:'burnout', muscle:'Shoulders', finisherName:'Back finisher'},
 {day:16, phase:'BURNOUT', title:'Triceps', type:'burnout', muscle:'Triceps', finisherName:'Core finisher'},
 {day:17, phase:'BURNOUT', title:'Back', type:'burnout', muscle:'Back', finisherName:'Biceps finisher'},
 {day:18, phase:'BURNOUT', title:'Chest', type:'burnout', muscle:'Chest', finisherName:'Triceps finisher'},
 {day:19, phase:'BURNOUT', title:'Shoulders', type:'burnout', muscle:'Shoulders', finisherName:'Back finisher'},
 {day:20, phase:'BURNOUT', title:'Legs', type:'burnout', muscle:'Legs', finisherName:'Wide push-up burnout'},
 {day:21, phase:'BURNOUT', title:'Back · Triceps · Chest', type:'multiburnout', muscles:['Back','Triceps','Chest'], finisherName:'Core finisher'},
 // Phase 4 — rest, then restart
 {day:22, phase:'REST', title:'Rest', type:'rest'},
 {day:23, phase:'REST', title:'Rest', type:'rest'},
];
const CYCLE_LENGTH = CYCLE.length;

const RECOVERY = {
  flow: ['Cat-cow (spine segmentation)', "World's greatest stretch", 'Deep squat hold', 'Hip circles (controlled)', 'Shoulder CARs', 'Thoracic rotations (open book)'],
  lower: ['90/90 hip switches', 'Pigeon stretch', 'Couch stretch', 'Hamstring flossing', 'Glute bridge holds', 'Knee-to-wall ankle mobilization', 'Calf stretch (straight + bent)', 'Slow bodyweight calf raises'],
  upper: ['Wall slides', 'Band pull-aparts (light)', 'Face pulls (light)', 'Doorway chest stretch', 'Scapular push-ups', 'Chin tucks', 'Slow neck circles'],
  cardio: ['20–40 min incline walk', 'Easy cycling (zone 2)', 'Light swim', 'Easy rowing', 'Full-body band circuit (very light)', 'Slow yoga flow'],
};

let state = null;
let viewDay = 1;
let saving = false;

function defaultState(){
  return { currentDay:1, checks:{}, customNames:{}, history:[], cycleCount:0 };
}

async function loadState(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    state = res && res.value ? JSON.parse(res.value) : defaultState();
  }catch(e){
    state = defaultState();
  }
  viewDay = state.currentDay;
  render();
}

async function saveState(){
  if(saving) return;
  saving = true;
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
  }catch(e){
    console.error('save failed', e);
  }
  saving = false;
}

function dayDef(n){ return CYCLE.find(d => d.day === n); }

function togglePip(key, idx, count){
  if(!state.checks[key]) state.checks[key] = Array(count).fill(false);
  state.checks[key][idx] = !state.checks[key][idx];
  saveState(); render();
}
function toggleFlag(key){
  state.checks[key] = !state.checks[key];
  saveState(); render();
}
function pickCardio(i){
  state.checks['r-cardio'] = i;
  saveState(); render();
}
function setCustomName(key, val){
  state.customNames[key] = val;
}

function completeDay(){
  const def = dayDef(state.currentDay);
  const now = new Date();
  const dateStr = now.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  state.history.unshift({date:dateStr, day:state.currentDay, title:def.title});
  state.history = state.history.slice(0,20);
  if(state.currentDay >= CYCLE_LENGTH){
    state.currentDay = 1;
    state.cycleCount += 1;
  } else {
    state.currentDay += 1;
  }
  state.checks = {};
  viewDay = state.currentDay;
  saveState();
  render();
}

function nav(delta){
  viewDay = viewDay + delta;
  if(viewDay < 1) viewDay = CYCLE_LENGTH;
  if(viewDay > CYCLE_LENGTH) viewDay = 1;
  render();
}
function jumpToday(){ viewDay = state.currentDay; render(); }

async function resetAll(){
  if(!confirm('Reset all progress? This clears your cycle position and history.')) return;
  try{ await window.storage.delete(STORAGE_KEY, false); }catch(e){}
  state = defaultState();
  viewDay = 1;
  render();
}

function renderPips(key, count, opts){
  opts = opts || {};
  const min = opts.min || count;
  const arr = state.checks[key] || Array(count).fill(false);
  let html = '<div class="pips">';
  for(let i=0;i<count;i++){
    const done = !!arr[i];
    const isBurn = opts.burnoutLast && i === count-1;
    const isOptional = i >= min;
    const ro = opts.readonly ? 'readonly' : '';
    const cls = `pip ${done?'done':''} ${isBurn?'burnoutset':''} ${isOptional?'optional':''} ${ro}`;
    const label = isBurn ? '🔥' : (i+1);
    const click = opts.readonly ? '' : `onclick="togglePip('${key}',${i},${count})"`;
    html += `<div class="${cls}" ${click}>${label}</div>`;
  }
  html += '</div>';
  if(min !== count){
    html += `<div class="pip-note">Pips ${min+1}–${count} are the optional extra sets in your ${min}–${count} range.</div>`;
  }
  return html;
}

function renderTrainingCard(ex, readonly){
  const flagHtml = ex.flag ? `<span class="flag">⚠ ${ex.flag}</span>` : '';
  const finHtml = ex.finisher ? `<span class="finisher-tag">finisher</span>` : '';
  const setsLabel = ex.setsMin === ex.setsMax ? `${ex.setsMax}` : `${ex.setsMin}–${ex.setsMax}`;
  return `
  <div class="card">
    <div class="ex-name">${ex.name} ${flagHtml} ${finHtml}</div>
    <div class="ex-meta">${setsLabel} sets × ${ex.reps}</div>
    ${ex.cue ? `<div class="ex-cue">${ex.cue}</div>` : ''}
    ${renderPips(ex.id, ex.setsMax, {readonly, min:ex.setsMin})}
  </div>`;
}

function renderBurnoutCard(def, readonly){
  const key = 'custom-'+def.day;
  const val = state.customNames[key] || '';
  const finKey = 'fin-'+def.day;
  const finDone = !!state.checks[finKey];
  return `
  <div class="card">
    <div class="ex-name">${def.muscle} <span class="finisher-tag">8 sets</span></div>
    <div class="ex-meta">Close to burnout · last set = full burnout</div>
    <input class="name-input" placeholder="Exercise (your pick)" value="${val}"
      ${readonly?'disabled':''} oninput="setCustomName('${key}', this.value)" onblur="saveState()">
    ${renderPips('pips-'+def.day, 8, {burnoutLast:true, readonly})}
  </div>
  <div class="card">
    <div class="check-line ${finDone?'done':''}" ${readonly?'':`onclick="toggleFlag('${finKey}')"`}>
      <div class="check-box ${finDone?'done':''}">${finDone?'✓':''}</div>
      <div class="check-text">${def.finisherName}</div>
    </div>
  </div>`;
}

function renderMultiburnoutCard(def, readonly){
  let html = '';
  def.muscles.forEach((m, i) => {
    const key = 'custom-'+def.day+'-'+i;
    const val = state.customNames[key] || '';
    html += `
    <div class="card">
      <div class="ex-name">${m} <span class="finisher-tag">3 sets</span></div>
      <div class="ex-meta">Close to burnout · last set = full burnout</div>
      <input class="name-input" placeholder="Exercise (your pick)" value="${val}"
        ${readonly?'disabled':''} oninput="setCustomName('${key}', this.value)" onblur="saveState()">
      ${renderPips('pips-'+def.day+'-'+i, 3, {burnoutLast:true, readonly})}
    </div>`;
  });
  const finKey = 'fin-'+def.day;
  const finDone = !!state.checks[finKey];
  html += `
  <div class="card">
    <div class="check-line ${finDone?'done':''}" ${readonly?'':`onclick="toggleFlag('${finKey}')"`}>
      <div class="check-box ${finDone?'done':''}">${finDone?'✓':''}</div>
      <div class="check-text">${def.finisherName}</div>
    </div>
  </div>`;
  return html;
}

function renderPairCard(def, readonly){
  let html = '';
  if(def.note){
    html += `<div class="card"><div class="ex-cue" style="margin-bottom:0;">${def.note}</div></div>`;
  }
  def.muscles.forEach((m,i) => {
    const key = 'custom-'+def.day+'-'+i;
    const val = state.customNames[key] || '';
    const doneKey = 'pairdone-'+def.day+'-'+i;
    const done = !!state.checks[doneKey];
    html += `
    <div class="card">
      <div class="ex-name">${m}</div>
      <input class="name-input" placeholder="Exercise (your pick)" value="${val}"
        ${readonly?'disabled':''} oninput="setCustomName('${key}', this.value)" onblur="saveState()">
      <div class="check-line ${done?'done':''}" ${readonly?'':`onclick="toggleFlag('${doneKey}')"`}>
        <div class="check-box ${done?'done':''}">${done?'✓':''}</div>
        <div class="check-text">Mark ${m} done</div>
      </div>
    </div>`;
  });
  if(def.finisherName){
    const finKey = 'fin-'+def.day;
    const finDone = !!state.checks[finKey];
    html += `
    <div class="card">
      <div class="check-line ${finDone?'done':''}" ${readonly?'':`onclick="toggleFlag('${finKey}')"`}>
        <div class="check-box ${finDone?'done':''}">${finDone?'✓':''}</div>
        <div class="check-text">${def.finisherName}</div>
      </div>
    </div>`;
  }
  return html;
}

function renderRecoveryCard(readonly){
  function group(label, items, prefix){
    let html = `<div class="group-label">${label}</div>`;
    items.forEach((t,i) => {
      const k = prefix+i;
      const done = !!state.checks[k];
      html += `<div class="check-line ${done?'done':''}" ${readonly?'':`onclick="toggleFlag('${k}')"`}>
        <div class="check-box ${done?'done':''}">${done?'✓':''}</div>
        <div class="check-text">${t}</div></div>`;
    });
    return html;
  }
  let html = '<div class="card">';
  html += group('Full-body mobility flow', RECOVERY.flow, 'r-flow-');
  html += group('Lower body recovery', RECOVERY.lower, 'r-lower-');
  html += group('Upper body recovery', RECOVERY.upper, 'r-upper-');
  html += `<div class="group-label">Pick one (light cardio)</div>`;
  RECOVERY.cardio.forEach((t,i) => {
    const k = 'r-cardio';
    const chosen = state.checks[k] === i;
    const clickAttr = readonly ? '' : `onclick="pickCardio(${i})"`;
    html += `<div class="check-line ${chosen?'done':''}" ${clickAttr}>
      <div class="check-box ${chosen?'done':''}">${chosen?'●':''}</div>
      <div class="check-text">${t}</div></div>`;
  });
  html += '</div>';
  return html;
}

function render(){
  const def = dayDef(viewDay);
  const isToday = viewDay === state.currentDay;
  const lap = state.cycleCount + 1;

  let dialHtml = renderDial();

  let body = '';
  if(def.type === 'pair'){
    body = renderPairCard(def, !isToday);
  } else if(def.type === 'training'){
    body = def.exercises.map(ex => renderTrainingCard(ex, !isToday)).join('');
  } else if(def.type === 'burnout'){
    body = renderBurnoutCard(def, !isToday);
  } else if(def.type === 'multiburnout'){
    body = renderMultiburnoutCard(def, !isToday);
  } else if(def.type === 'recovery'){
    body = renderRecoveryCard(!isToday);
  } else if(def.type === 'rest'){
    body = `<div class="card"><div class="restmsg">No training today.<br><b>Sleep, eat, recover.</b><br>The cycle resumes tomorrow.</div></div>`;
  }

  const actionHtml = isToday
    ? `<button class="complete-btn" onclick="completeDay()">Complete Day →</button>`
    : `<button class="preview-btn" onclick="jumpToday()">← Jump to today (${weekdayFor(state.currentDay)})</button>`;

  const histHtml = state.history.length
    ? state.history.slice(0,6).map(h => `<div class="h-row"><span>${weekdayFor(h.day)}</span><span>${h.title}</span><span>${h.date}</span></div>`).join('')
    : `<div class="empty-hist">No days logged yet.</div>`;

  document.getElementById('app').innerHTML = `
    <div class="eyebrow">${CYCLE_LENGTH}-Day Rotation · Day ${String(viewDay).padStart(2,'0')} of ${CYCLE_LENGTH}</div>
    <div class="dial-wrap">${dialHtml}</div>
    <h1 class="title">${weekdayFor(viewDay)}</h1>
    <div class="subtitle">${def.title}</div>
    <div class="phase-row"><span class="phase-tag ph-${def.phase}">${def.phase}</span></div>

    <div class="nav">
      <button class="navbtn" onclick="nav(-1)">‹</button>
      <div class="status-pill ${isToday?'today':''}" onclick="jumpToday()">${isToday ? 'TODAY · LAP '+lap : 'PREVIEW — TAP TO RETURN'}</div>
      <button class="navbtn" onclick="nav(1)">›</button>
    </div>

    ${body}
    ${actionHtml}

    <div class="history">
      <div class="history-title">Recent log</div>
      ${histHtml}
    </div>

    <div class="footer-row">
      <span></span>
      <span class="reset-link" onclick="resetAll()">reset all progress</span>
    </div>
  `;
}

function renderDial(){
  const total = CYCLE_LENGTH;
  const lap = state.cycleCount + 1;
  let ticks = '';
  for(let i=1;i<=total;i++){
    const angle = (i-1) * (360/total) - 90;
    const def = dayDef(i);
    const isRestType = def.phase === 'REST' || def.phase === 'RECOVERY';
    let color = '#3a332c';
    let len = 10, w = 3;
    if(i === state.currentDay){ color = '#d6334a'; len = 16; w = 4; }
    else if(i < state.currentDay){ color = '#5a2027'; len = 10; w = 3; }
    else { color = isRestType ? '#3a332c' : '#5c5448'; len = 10; w = 3; }
    const rOuter = 86, rInner = rOuter - len;
    const rad = angle * Math.PI/180;
    const x1 = 100 + rInner*Math.cos(rad), y1 = 100 + rInner*Math.sin(rad);
    const x2 = 100 + rOuter*Math.cos(rad), y2 = 100 + rOuter*Math.sin(rad);
    ticks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="${w}" stroke-linecap="round"/>`;
  }
  return `
  <div style="position:relative;width:200px;height:200px;">
    <svg width="200" height="200" viewBox="0 0 200 200">${ticks}</svg>
    <div class="dial-center" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">
      <div class="lap">LAP ${lap}</div>
      <div class="num" style="font-size:20px;">${weekdayFor(state.currentDay).slice(0,3).toUpperCase()}</div>
      <div class="of">DAY ${state.currentDay} OF ${CYCLE_LENGTH}</div>
    </div>
  </div>`;
}

loadState();
</script>
</body>
</html>
